version: 2
updates:
  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7

  # Enable version updates for Cargo. The workspace root covers all member
  # crates; the additional directories are standalone test-fixture packages
  # that are not workspace members.
  - package-ecosystem: "cargo"
    directories:
      - "/"
      - "/crates/cargo-bdd/tests/fixtures/minimal"
      - "/crates/rstest-bdd/tests/fixtures_macros"
      - "/crates/rstest-bdd/tests/ui_macros"
      - "/crates/rstest-bdd/tests/ui_lints"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "cargo"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
      semver-major-days: 14

  # Enable version updates for the uv-managed Python tooling environment
  - package-ecosystem: "uv"
    directory: "/"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
      semver-major-days: 14
