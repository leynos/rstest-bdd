name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
      CODESCENE_CLI_SHA256: ${{ vars.CODESCENE_CLI_SHA256 }}
      RUSTFLAGS: -D warnings
      RUSTDOCFLAGS: -D warnings
      LADING_REF: d3217a599ea34adad6a6e3845845fff2fe923758
      MERMAN_CLI_VERSION: '0.7.0'
      WHITAKER_INSTALLER_VERSION: '0.2.6'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            coverage: true
            features: ''
            with-default-features: true
            tools: true
            use-nextest: true
          - os: ubuntu-latest
            coverage: true
            features: strict-compile-time-validation
            with-default-features: false
            tools: true
            use-nextest: true
          - os: windows-latest
            coverage: true
            features: ''
            with-default-features: true
            tools: false
            # Avoid Windows nested Cargo/nextest hangs; see
            # rust-lang/cargo#15744 and nextest-rs/nextest#2463.
            use-nextest: false
          - os: windows-latest
            coverage: true
            features: strict-compile-time-validation
            with-default-features: false
            tools: false
            # Avoid Windows nested Cargo/nextest hangs; see
            # rust-lang/cargo#15744 and nextest-rs/nextest#2463.
            use-nextest: false
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v5
        with:
          # CodeScene's `cs-coverage check` diffs the pull request against
          # its merge base, so the full history must be reachable.
          fetch-depth: 0

      - name: Free disk space
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          set -uo pipefail
          # Coverage builds the workspace once; `make publish-check` then
          # compiles it again into a separate target directory. On the
          # strict-feature leg the two builds exhaust the runner's disk, so
          # reclaim space from large preinstalled toolchains we do not use.
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost \
            /usr/local/share/powershell || true
          df -h /

      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@c3141c3d4cb2a2828d2abbcf3d94b15197740c58

      - name: Install bun
        if: ${{ matrix.tools }}
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461  # v2
        with:
          bun-version: '1.2.21'

      - name: Setup uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          version: '0.11.8'

      - name: Check formatting
        if: ${{ matrix.tools }}
        run: make check-fmt

      - name: Set up isolated Rust for Merman
        if: ${{ matrix.tools }}
        run: rustup toolchain install 1.95.0

      - name: Cache Merman CLI
        if: ${{ matrix.tools }}
        id: cache-merman-cli
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.cargo/bin/merman-cli
          key: merman-cli-${{ runner.os }}-${{ runner.arch }}-${{ env.MERMAN_CLI_VERSION }}

      - name: Install Merman CLI
        if: ${{ matrix.tools && steps.cache-merman-cli.outputs.cache-hit != 'true' }}
        run: cargo +1.95.0 install merman-cli --version "=${MERMAN_CLI_VERSION}" --locked

      - name: Install Mermaid CLI
        if: ${{ matrix.tools }}
        run: |
          set -euxo pipefail
          bun install --no-progress --global @mermaid-js/mermaid-cli@11.9.0
          bun x @puppeteer/browsers browsers install chrome-headless-shell
          mmdc --version

      - name: Install Nixie
        if: ${{ matrix.tools }}
        run: uv tool install nixie-cli==1.1.0

      - name: Cache Whitaker installer
        if: ${{ matrix.tools }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: |
            ~/.cargo/bin/whitaker-installer
            ~/.cache/cargo-binstall
          key: whitaker-installer-${{ runner.os }}-${{ runner.arch }}-${{ env.WHITAKER_INSTALLER_VERSION }}

      - name: Install Whitaker
        if: ${{ matrix.tools }}
        run: |
          if ! command -v whitaker-installer >/dev/null 2>&1; then
            if cargo binstall --version >/dev/null 2>&1; then
              cargo binstall --no-confirm --locked "whitaker-installer@${WHITAKER_INSTALLER_VERSION}"
            else
              echo "cargo-binstall unavailable; building whitaker-installer from crates.io"
              cargo install --locked whitaker-installer --version "${WHITAKER_INSTALLER_VERSION}"
            fi
          fi
          whitaker-installer

      - name: Nixie
        if: ${{ matrix.tools }}
        run: make nixie

      - name: Markdown lint
        if: ${{ matrix.tools }}
        uses: DavidAnson/markdownlint-cli2-action@992badcdf24e3b8eb7e87ff9287fe931bcb00c6e  # v20
        with:
          globs: '**/*.md'

      - name: Spelling (en-GB-oxendict)
        if: ${{ matrix.tools }}
        run: make spelling

      - name: Lint
        if: ${{ matrix.tools }}
        run: make lint

      - name: Workflow contract tests
        if: ${{ matrix.tools && matrix.features == '' }}
        run: make test-workflow-contracts

      - name: Ensure async-trait is absent
        if: ${{ matrix.tools }}
        run: make forbid-async-trait

      - name: Type check
        if: ${{ matrix.tools }}
        run: make typecheck

      - name: Test and Measure Coverage (with features)
        if: ${{ matrix.coverage && matrix.features != '' }}
        uses: leynos/shared-actions/.github/actions/generate-coverage@18bed1ca49a6de3d8882bd72635a32ae3f023d57
        continue-on-error: true
        env:
          # Windows coverage runs (build plus doctests) exceed the shared
          # action's 600s per-invocation default; give them headroom.
          RUN_RUST_CARGO_WAIT_TIMEOUT: '1800'
        with:
          output-path: coverage.xml
          format: cobertura
          features: rstest-bdd/diagnostics rstest-bdd-server/test-support ${{ matrix.features }}
          with-default-features: ${{ matrix.with-default-features }}
          use-cargo-nextest: ${{ matrix.use-nextest }}
          # Run the Python coverage suite serially: the whitaker lint-gate
          # integration test shells out to `cargo dylint`, so parallel
          # xdist workers race on the cargo package-cache lock.
          pytest-workers: ''

      - name: Test and Measure Coverage (no features)
        if: ${{ matrix.coverage && matrix.features == '' }}
        uses: leynos/shared-actions/.github/actions/generate-coverage@18bed1ca49a6de3d8882bd72635a32ae3f023d57
        # The CodeScene leg (the default-features Linux leg) gates on the
        # ratchet, so a coverage failure must fail the build there; other
        # legs stay best-effort as before. Selected by matrix values rather
        # than a dedicated key so the job name (a required check context)
        # is unchanged.
        continue-on-error: ${{ !(matrix.os == 'ubuntu-latest' && matrix.features == '') }}
        env:
          # Windows coverage runs (build plus doctests) exceed the shared
          # action's 600s per-invocation default; give them headroom.
          RUN_RUST_CARGO_WAIT_TIMEOUT: '1800'
        with:
          output-path: coverage.xml
          format: cobertura
          features: rstest-bdd/diagnostics rstest-bdd-macros/compile-time-validation rstest-bdd-server/test-support
          with-default-features: ${{ matrix.with-default-features }}
          use-cargo-nextest: ${{ matrix.use-nextest }}
          # Run the Python coverage suite serially: the whitaker lint-gate
          # integration test shells out to `cargo dylint`, so parallel
          # xdist workers race on the cargo package-cache lock.
          pytest-workers: ''
          # Ratchet only the default-features Linux leg: the two Linux
          # coverage legs would otherwise collide on the per-run baseline
          # cache key.
          with-ratchet: ${{ (matrix.os == 'ubuntu-latest' && matrix.features == '') && 'true' || 'false' }}

      - name: Verify coverage output exists
        if: ${{ matrix.coverage }}
        shell: bash
        run: |
          set -euo pipefail
          test -s coverage.xml

      - name: Check coverage against CodeScene gates
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: >-
          matrix.os == 'ubuntu-latest' &&
          matrix.features == '' &&
          github.event_name == 'pull_request' &&
          env.CS_ACCESS_TOKEN != ''
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@18bed1ca49a6de3d8882bd72635a32ae3f023d57
        with:
          format: cobertura
          mode: check
          project-url: https://api.codescene.io/v2/projects/69391
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}

      - name: Publish dry run
        run: make publish-check
