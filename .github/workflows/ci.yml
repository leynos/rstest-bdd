name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
      CODESCENE_CLI_SHA256: ${{ vars.CODESCENE_CLI_SHA256 }}
      RUSTFLAGS: -D warnings
      RUSTDOCFLAGS: -D warnings
      LADING_REF: d3217a599ea34adad6a6e3845845fff2fe923758
      WHITAKER_TAG: v0.2.5
      WHITAKER_TOOLCHAIN: nightly-2025-09-18
      CARGO_DYLINT_VERSION: 5.0.0
      DYLINT_LINK_VERSION: 5.0.0
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            coverage: true
            codescene-check: true
            features: ''
            with-default-features: true
            tools: true
            use-nextest: true
          - os: ubuntu-latest
            coverage: true
            features: strict-compile-time-validation
            with-default-features: false
            tools: true
            use-nextest: true
          - os: windows-latest
            coverage: true
            features: ''
            with-default-features: true
            tools: false
            use-nextest: false   # trybuild + nextest deadlocks on Windows
          - os: windows-latest
            coverage: true
            features: strict-compile-time-validation
            with-default-features: false
            tools: false
            use-nextest: false   # trybuild + nextest deadlocks on Windows
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v5
        with:
          # CodeScene's `cs-coverage check` diffs the pull request against
          # its merge base, so the full history must be reachable.
          fetch-depth: 0

      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@927edd45ae77be4251a8a18ca9eb5613a2e32cbd

      - name: Install bun
        if: ${{ matrix.tools }}
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461  # v2
        with:
          bun-version: '1.2.21'

      - name: Setup uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          version: '0.11.8'

      - name: Check formatting
        if: ${{ matrix.tools }}
        run: make check-fmt

      - name: Install Mermaid CLI
        if: ${{ matrix.tools }}
        run: |
          set -euxo pipefail
          bun install --no-progress --global @mermaid-js/mermaid-cli@11.9.0
          bun x @puppeteer/browsers browsers install chrome-headless-shell
          mmdc --version

      - name: Install Nixie
        if: ${{ matrix.tools }}
        run: uv tool install nixie-cli==1.0.0

      - name: Cache Whitaker lint library
        id: whitaker-cache
        if: ${{ matrix.tools && runner.os == 'Linux' }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: |
            target/whitaker
            ~/.cargo/bin/cargo-dylint
            ~/.cargo/bin/dylint-link
          key: whitaker-no-unwrap-or-else-panic-${{ runner.os }}-${{ env.WHITAKER_TAG }}-${{ env.WHITAKER_TOOLCHAIN }}-cargo-dylint-${{ env.CARGO_DYLINT_VERSION }}

      - name: Install Dylint tools
        if: ${{ matrix.tools && (runner.os != 'Linux' || steps.whitaker-cache.outputs.cache-hit != 'true') }}
        run: |
          set -euxo pipefail
          cargo install --locked cargo-dylint --version "${CARGO_DYLINT_VERSION}"
          cargo install --locked dylint-link --version "${DYLINT_LINK_VERSION}"

      - name: Nixie
        if: ${{ matrix.tools }}
        run: make nixie

      - name: Markdown lint
        if: ${{ matrix.tools }}
        uses: DavidAnson/markdownlint-cli2-action@992badcdf24e3b8eb7e87ff9287fe931bcb00c6e  # v20
        with:
          globs: '**/*.md'

      - name: Spelling (en-GB-oxendict)
        if: ${{ matrix.tools }}
        run: make spellcheck

      - name: Lint
        if: ${{ matrix.tools }}
        run: make lint

      - name: Workflow contract tests
        if: ${{ matrix.tools && matrix.features == '' }}
        run: make test-workflow-contracts

      - name: Ensure async-trait is absent
        if: ${{ matrix.tools }}
        run: make forbid-async-trait

      - name: Type check
        if: ${{ matrix.tools }}
        run: make typecheck

      - name: Test and Measure Coverage (with features)
        if: ${{ matrix.coverage && matrix.features != '' }}
        uses: leynos/shared-actions/.github/actions/generate-coverage@927edd45ae77be4251a8a18ca9eb5613a2e32cbd
        continue-on-error: true
        env:
          # Windows coverage runs (build plus doctests) exceed the shared
          # action's 600s per-invocation default; give them headroom.
          RUN_RUST_CARGO_WAIT_TIMEOUT: '1800'
        with:
          output-path: coverage.xml
          format: cobertura
          features: rstest-bdd/diagnostics rstest-bdd-server/test-support ${{ matrix.features }}
          with-default-features: ${{ matrix.with-default-features }}
          use-cargo-nextest: ${{ matrix.use-nextest }}

      - name: Test and Measure Coverage (no features)
        if: ${{ matrix.coverage && matrix.features == '' }}
        uses: leynos/shared-actions/.github/actions/generate-coverage@927edd45ae77be4251a8a18ca9eb5613a2e32cbd
        # The CodeScene leg gates on the ratchet, so a coverage failure must
        # fail the build there; other legs stay best-effort as before.
        continue-on-error: ${{ !matrix.codescene-check }}
        env:
          # Windows coverage runs (build plus doctests) exceed the shared
          # action's 600s per-invocation default; give them headroom.
          RUN_RUST_CARGO_WAIT_TIMEOUT: '1800'
        with:
          output-path: coverage.xml
          format: cobertura
          features: rstest-bdd/diagnostics rstest-bdd-macros/compile-time-validation rstest-bdd-server/test-support
          with-default-features: ${{ matrix.with-default-features }}
          use-cargo-nextest: ${{ matrix.use-nextest }}
          # Ratchet only the single CodeScene leg: the two Linux coverage
          # legs would otherwise collide on the per-run baseline cache key.
          with-ratchet: ${{ matrix.codescene-check && 'true' || 'false' }}

      - name: Verify coverage output exists
        if: ${{ matrix.coverage }}
        shell: bash
        run: |
          set -euo pipefail
          test -s coverage.xml

      - name: Publish dry run
        run: make publish-check

      - name: Check coverage against CodeScene gates
        # Run on a single leg only, or CodeScene receives duplicate uploads
        # per commit. The guard lets token-less runs (forks) skip cleanly.
        if: ${{ matrix.codescene-check && env.CS_ACCESS_TOKEN != '' }}
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@927edd45ae77be4251a8a18ca9eb5613a2e32cbd
        with:
          format: cobertura
          mode: check
          project-url: https://api.codescene.io/v2/projects/69391
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}
