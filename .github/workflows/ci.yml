name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
      CODESCENE_CLI_SHA256: ${{ vars.CODESCENE_CLI_SHA256 }}
      RUSTFLAGS: -D warnings
      RUSTDOCFLAGS: -D warnings
      LADING_REF: d3217a599ea34adad6a6e3845845fff2fe923758
      WHITAKER_INSTALLER_VERSION: '0.2.5'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            coverage: true
            features: ''
            with-default-features: true
            tools: true
            use-nextest: true
          - os: ubuntu-latest
            coverage: true
            features: strict-compile-time-validation
            with-default-features: false
            tools: true
            use-nextest: true
          - os: windows-latest
            coverage: true
            features: ''
            with-default-features: true
            tools: false
            use-nextest: false   # trybuild + nextest deadlocks on Windows
          - os: windows-latest
            coverage: true
            features: strict-compile-time-validation
            with-default-features: false
            tools: false
            use-nextest: false   # trybuild + nextest deadlocks on Windows
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v5

      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@aebb3f5b831102e2a10ef909c83d7d50ea86c332

      - name: Install bun
        if: ${{ matrix.tools }}
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461  # v2
        with:
          bun-version: '1.2.21'

      - name: Setup uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          version: '0.11.8'

      - name: Check formatting
        if: ${{ matrix.tools }}
        run: make check-fmt

      - name: Install Mermaid CLI
        if: ${{ matrix.tools }}
        run: |
          set -euxo pipefail
          bun install --no-progress --global @mermaid-js/mermaid-cli@11.9.0
          bun x @puppeteer/browsers browsers install chrome-headless-shell
          mmdc --version

      - name: Install Nixie
        if: ${{ matrix.tools }}
        run: uv tool install nixie-cli==1.0.0

      - name: Cache Whitaker installer
        if: ${{ matrix.tools }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: |
            ~/.cargo/bin/whitaker-installer
            ~/.cache/cargo-binstall
          key: whitaker-installer-${{ runner.os }}-${{ runner.arch }}-${{ env.WHITAKER_INSTALLER_VERSION }}

      - name: Install Whitaker
        if: ${{ matrix.tools }}
        run: |
          if ! command -v whitaker-installer >/dev/null 2>&1; then
            if cargo binstall --version >/dev/null 2>&1; then
              cargo binstall --no-confirm --locked "whitaker-installer@${WHITAKER_INSTALLER_VERSION}"
            else
              echo "cargo-binstall unavailable; building whitaker-installer from crates.io"
              cargo install --locked whitaker-installer --version "${WHITAKER_INSTALLER_VERSION}"
            fi
          fi
          whitaker-installer

      - name: Nixie
        if: ${{ matrix.tools }}
        run: make nixie

      - name: Markdown lint
        if: ${{ matrix.tools }}
        uses: DavidAnson/markdownlint-cli2-action@992badcdf24e3b8eb7e87ff9287fe931bcb00c6e  # v20
        with:
          globs: '**/*.md'

      - name: Spelling (en-GB-oxendict)
        if: ${{ matrix.tools }}
        run: make spellcheck

      - name: Lint
        if: ${{ matrix.tools }}
        run: make lint

      - name: Workflow contract tests
        if: ${{ matrix.tools && matrix.features == '' }}
        run: make test-workflow-contracts

      - name: Ensure async-trait is absent
        if: ${{ matrix.tools }}
        run: make forbid-async-trait

      - name: Type check
        if: ${{ matrix.tools }}
        run: make typecheck

      - name: Test and Measure Coverage (with features)
        if: ${{ matrix.coverage && matrix.features != '' }}
        uses: leynos/shared-actions/.github/actions/generate-coverage@aebb3f5b831102e2a10ef909c83d7d50ea86c332
        continue-on-error: true
        with:
          output-path: coverage.xml
          format: cobertura
          features: rstest-bdd/diagnostics rstest-bdd-server/test-support ${{ matrix.features }}
          with-default-features: ${{ matrix.with-default-features }}
          use-cargo-nextest: ${{ matrix.use-nextest }}

      - name: Test and Measure Coverage (no features)
        if: ${{ matrix.coverage && matrix.features == '' }}
        uses: leynos/shared-actions/.github/actions/generate-coverage@aebb3f5b831102e2a10ef909c83d7d50ea86c332
        continue-on-error: true
        with:
          output-path: coverage.xml
          format: cobertura
          features: rstest-bdd/diagnostics rstest-bdd-macros/compile-time-validation rstest-bdd-server/test-support
          with-default-features: ${{ matrix.with-default-features }}
          use-cargo-nextest: ${{ matrix.use-nextest }}

      - name: Verify coverage output exists
        if: ${{ matrix.coverage }}
        shell: bash
        run: |
          set -euo pipefail
          test -s coverage.xml

      - name: Publish dry run
        run: make publish-check

      - name: Upload coverage data to CodeScene
        if: ${{ matrix.coverage && env.CS_ACCESS_TOKEN && matrix.tools && vars.CODESCENE_CLI_SHA256 }}
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@aebb3f5b831102e2a10ef909c83d7d50ea86c332
        with:
          format: cobertura
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}
